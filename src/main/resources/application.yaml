spring:
  application:
    name: www
  datasource:
    url: jdbc:postgresql:jdbc:postgresql://database-1.c5cq0qqg2ihe.ap-south-1.rds.amazonaws.com:5432/postgres
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect


logging:
