    # Root level for the entire application
    root: INFO
    # Specific level for Spring Framework
    org.springframework.web: DEBUG
    # Specific level for your application code
    com.yshop.www: TRACE

  file:
    # Creates a file named app.log in the 'logs' directory
    name: logs/app.log

